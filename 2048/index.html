<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048 - 霓虹街机版</title>
  <meta name="description" content="一个视觉惊艳、带8-bit复古音效的在线2048游戏。支持键盘与移动端划屏操作，带有弹性滑行合并动效。">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect x=%2210%22 y=%2210%22 width=%2280%22 height=%2280%22 rx=%2215%22 fill=%22%23fee440%22/><text x=%2250%22 y=%2265%22 font-size=%2245%22 font-family=%22Orbitron%22 font-weight=%22900%22 text-anchor=%22middle%22 fill=%22%23080512%22>2K</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 顶部控制面板 -->
  <header class="header-bar">
    <button id="muteBtn" class="icon-btn" title="开关音效" aria-label="Mute sound">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
        <path id="soundWave" d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"></path>
      </svg>
    </button>
    
    <div class="score-container">
      <div class="score-box">
        <div class="score-label">Score</div>
        <div id="scoreVal" class="score-value">0</div>
      </div>
      <div class="score-box best">
        <div class="score-label">Best</div>
        <div id="bestVal" class="score-value">0</div>
      </div>
    </div>
  </header>

  <h1 class="game-title">2048</h1>

  <!-- 核心游戏容器 -->
  <main class="game-container" id="gameContainer">
    
    <!-- 背景底板 (16个灰色网格) -->
    <div class="grid-container">
      <div class="grid-cell"></div>
      <div class="grid-cell"></div>
      <div class="grid-cell"></div>
      <div class="grid-cell"></div>
      <div class="grid-cell"></div>
      <div class="grid-cell"></div>
      <div class="grid-cell"></div>
      <div class="grid-cell"></div>
      <div class="grid-cell"></div>
      <div class="grid-cell"></div>
      <div class="grid-cell"></div>
      <div class="grid-cell"></div>
      <div class="grid-cell"></div>
      <div class="grid-cell"></div>
      <div class="grid-cell"></div>
      <div class="grid-cell"></div>
    </div>

    <!-- 动态数字方块的寄生层 -->
    <div class="tile-container" id="tileContainer">
      <!-- 动态插入数字方块 DOM -->
    </div>

    <!-- 游戏胜利遮罩 -->
    <div id="gameWinOverlay" class="overlay hidden">
      <h2 class="win-text">YOU WIN!</h2>
      <p>不可思议！你成功合成了 2048 霓虹终极体！</p>
      <button id="keepGoingBtn" class="btn" style="margin-bottom:10px;">继续挑战</button>
      <button id="winRestartBtn" class="btn btn-pink">重新开始</button>
    </div>

    <!-- 游戏结束遮罩 -->
    <div id="gameOverOverlay" class="overlay hidden">
      <h2 class="over-text">GAME OVER</h2>
      <p>棋盘已经被塞爆了，没有可以合并的方块啦。</p>
      <button id="restartBtn" class="btn btn-pink">再试一次</button>
    </div>
    
  </main>

  <!-- 玩法说明 -->
  <footer class="description">
    <p>键盘使用 <span class="badge">W / A / S / D</span> 或 <span class="badge">&uarr; / &larr; / &darr; / &rarr;</span> 滑动方块。</p>
    <p>手机端直接在屏幕上<strong>上下左右划动</strong>即可操作。</p>
    <p>相同数字的方块撞在一起会<strong>合二为一</strong>，把他们凑到 2048 吧！</p>
  </footer>

  <script src="game.js"></script>
</body>
</html>
