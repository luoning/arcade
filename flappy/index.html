<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cyber Flappy - 赛博电磁鸟</title>
  <meta name="description" content="一个发光霓虹赛博电磁鸟游戏，带有高压电磁管障碍、跳跃推进粒子与 Web Audio 8-bit 合成音效。">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2240%22 fill=%22%2300bbf9%22/><circle cx=%2265%22 cy=%2240%22 r=%226%22 fill=%22%23fff%22/></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 顶部状态看板 -->
  <header class="header-bar">
    <button id="muteBtn" class="icon-btn" title="开关音效" aria-label="Mute sound">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
        <path id="soundWave" d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"></path>
      </svg>
    </button>
    
    <div class="stats-container">
      <div class="stat-box score">
        <div class="stat-label">SCORE</div>
        <div id="scoreVal" class="stat-value">0</div>
      </div>
      <div class="stat-box best">
        <div class="stat-label">BEST</div>
        <div id="bestVal" class="stat-value">0</div>
      </div>
    </div>
  </header>

  <h1 class="game-title">CYBER FLAPPY</h1>

  <!-- 画布容器 -->
  <main class="canvas-wrapper">
    <canvas id="gameCanvas" width="400" height="560"></canvas>
    
    <!-- 开始遮罩 -->
    <div id="startOverlay" class="overlay">
      <h2 class="start-text">CYBER FLAPPY</h2>
      <p>点击屏幕、画布或按键盘<strong>空格键 / W</strong> 让电磁鸟向上推进起飞！</p>
      <p>避开上下两端不断袭来的<strong>高压电磁柱 (Cyan)</strong>！</p>
      <p>电柱空档之间还会随机刷出<strong>游走的等离子电球</strong>，保持警惕！</p>
      <button id="startBtn" class="btn">同步核心</button>
    </div>

    <!-- GG 失败遮罩 -->
    <div id="gameOverOverlay" class="overlay hidden">
      <h2 class="over-text">SYSTEM OVERLOAD</h2>
      <p>机翼遭遇强电磁过载，动力系统短路坠毁！</p>
      <div class="clear-stats">
        <div>最终得分: <span id="failScoreVal" class="highlight">0</span></div>
      </div>
      <button id="restartBtn" class="btn btn-pink">重启核心</button>
    </div>
  </main>

  <footer class="help-guide">
    <p>键盘使用 <span class="badge">Space (空格)</span> 或 <span class="badge">W</span> 或 <span class="badge">&uarr;</span> 进行高度推进。</p>
    <p>手机端/触屏可直接<strong>点击 Canvas 画布任意位置</strong>让电磁鸟跃升！</p>
  </footer>

  <script src="game.js"></script>
</body>
</html>
