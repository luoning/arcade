<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Snake - 赛博贪吃蛇</title>
  <meta name="description" content="一个视觉惊艳的霓虹赛博贪吃蛇游戏，带流光拖尾、重力加速道具和 Web Audio 8-bit 合成音效。">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect x=%2210%22 y=%2220%22 width=%2280%22 height=%2260%22 rx=%2215%22 fill=%22%2339ff14%22/><circle cx=%2240%22 cy=%2250%22 r=%2210%22 fill=%22%23000%22/><circle cx=%2265%22 cy=%2250%22 r=%2210%22 fill=%22%23000%22/></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 顶部数据看板 -->
  <header class="header-bar">
    <button id="muteBtn" class="icon-btn" title="开关音效" aria-label="Mute sound">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
        <path id="soundWave" d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"></path>
      </svg>
    </button>
    
    <div class="stats-container">
      <div class="stat-box score">
        <div class="stat-label">SCORE</div>
        <div id="scoreVal" class="stat-value">0</div>
      </div>
      <div class="stat-box best">
        <div class="stat-label">BEST</div>
        <div id="bestVal" class="stat-value">0</div>
      </div>
      <div class="stat-box speed">
        <div class="stat-label">SPEED</div>
        <div id="speedVal" class="stat-value">1.0X</div>
      </div>
    </div>
  </header>

  <h1 class="game-title">CYBER SNAKE</h1>

  <!-- 画布卡片 -->
  <main class="canvas-wrapper">
    <canvas id="gameCanvas" width="600" height="480"></canvas>
    
    <!-- 开始游戏遮罩 -->
    <div id="startOverlay" class="overlay">
      <h2 class="start-text">CYBER SNAKE</h2>
      <p>键盘方向键控制发光的电磁蛇改变方向！</p>
      <p>吞噬闪烁的“能量核心”让身体变长！小心避开墙壁和自己的身体！</p>
      <p>吃掉绿色双折闪电会进入<strong>超频加速</strong>，吃掉紫色圆环则会<strong>大幅减速</strong>！</p>
      <button id="startBtn" class="btn">同步核心</button>
    </div>

    <!-- 游戏结束 GG 遮罩 -->
    <div id="gameOverOverlay" class="overlay hidden">
      <h2 class="over-text">SYSTEM OFFLINE</h2>
      <p>蛇头电磁短路！核心网络已断开。</p>
      <div class="clear-stats">
        <div>最终得分: <span id="failScoreVal" class="highlight">0</span></div>
      </div>
      <button id="restartBtn" class="btn btn-pink">重启核心</button>
    </div>
  </main>

  <footer class="help-guide">
    <p>键盘使用 <span class="badge">&larr; / &uarr; / &rarr; / &darr;</span> 或 <span class="badge">W / A / S / D</span> 改变蛇的前进方向。</p>
    <p>也支持在屏幕/画布上向<strong>上下左右滑动手指或鼠标</strong>进行滑手遥控，操作流畅灵敏！</p>
  </footer>

  <script src="game.js"></script>
</body>
</html>
