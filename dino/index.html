<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cyber Dino - 赛博小恐龙</title>
  <meta name="description" content="一个发光霓虹跑酷小恐龙游戏，带有昼夜反转、机械翼龙避让和 Web Audio 8-bit 合成音效。">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect x=%2220%22 y=%2230%22 width=%2250%22 height=%2250%22 rx=%2210%22 fill=%22%2339ff14%22/><circle cx=%2255%22 cy=%2245%22 r=%225%22 fill=%22%23000%22/></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 顶部状态看板 -->
  <header class="header-bar">
    <button id="muteBtn" class="icon-btn" title="开关音效" aria-label="Mute sound">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
        <path id="soundWave" d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"></path>
      </svg>
    </button>
    
    <div class="stats-container">
      <div class="stat-box score">
        <div class="stat-label">SCORE</div>
        <div id="scoreVal" class="stat-value">00000</div>
      </div>
      <div class="stat-box best">
        <div class="stat-label">HI-SCORE</div>
        <div id="bestVal" class="stat-value">00000</div>
      </div>
    </div>
  </header>

  <h1 class="game-title">CYBER DINO</h1>

  <!-- 画布视口 -->
  <main class="canvas-wrapper">
    <canvas id="gameCanvas" width="640" height="320"></canvas>
    
    <!-- 开始遮罩 -->
    <div id="startOverlay" class="overlay">
      <h2 class="start-text">CYBER DINO</h2>
      <p>按键盘<strong>空格键 / W / &uarr;</strong>跳跃跃升，<strong>S / &darr;</strong>低头俯冲！</p>
      <p>闪避地平线上袭来的<strong>霓虹仙人掌</strong>与空中飞来的<strong>电子翼龙</strong>！</p>
      <p>随距离增加速度会持续加快，昼夜交替还会伴随黑白反转警示，考验反应！</p>
      <button id="startBtn" class="btn">同步核心</button>
    </div>

    <!-- 失败 GG 遮罩 -->
    <div id="gameOverOverlay" class="overlay hidden">
      <h2 class="over-text">SYSTEM OFFLINE</h2>
      <p>传动齿轮碰撞短路！小恐龙已离线。</p>
      <div class="clear-stats">
        <div>跑酷路程: <span id="failScoreVal" class="highlight">00000</span></div>
      </div>
      <button id="restartBtn" class="btn btn-pink">重建核心</button>
    </div>
  </main>

  <footer class="help-guide">
    <p>键盘使用 <span class="badge">Space (空格)</span> 或 <span class="badge">&uarr;</span> 跳跃，按住 <span class="badge">&darr;</span> 或 <span class="badge">S</span> 低头避让。</p>
    <p>手机端操作：在屏幕上<strong>向上滑动</strong>触发跳跃，<strong>向下滑动</strong>触发低头动作。</p>
  </footer>

  <script src="game.js"></script>
</body>
</html>
