<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赛博国际象棋 - Cyber Chess</title>
  <meta name="description" content="一个视觉炸裂、带有 8-bit 合成音效与 AI 棋手的赛博霓虹国际象棋游戏。">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 顶部状态栏与控制面板 -->
  <header class="header-bar">
    <div class="controls">
      <button id="muteBtn" class="icon-btn" title="开关音效" aria-label="Mute sound">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <path id="soundWave" d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"></path>
        </svg>
      </button>

      <select id="modeSelect" class="select-menu" aria-label="Select game mode">
        <option value="vs_ai">人机演兵 (VS AI)</option>
        <option value="pvp">同屏对攻 (PvP)</option>
      </select>

      <button id="resetBtn" class="icon-btn" title="重新局棋" aria-label="Reset game">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
        </svg>
      </button>
    </div>

    <div class="status-panel">
      <div class="status-box">
        <div class="status-label">回合 (Turn)</div>
        <div id="turnVal" class="status-value">WHITE</div>
      </div>
      <div class="status-box">
        <div class="status-label">步数 (Steps)</div>
        <div id="stepsVal" class="status-value">0</div>
      </div>
    </div>
  </header>

  <h1 class="game-title">赛博国际象棋</h1>

  <!-- 国际象棋棋盘主体 -->
  <main class="board-container" id="boardContainer">
    <div class="board-grid" id="boardGrid">
      <!-- 格子与棋子由 JS 渲染 -->
    </div>

    <!-- 兵卒升变选择弹窗 (遮罩模式) -->
    <div id="promotionOverlay" class="overlay hidden">
      <div class="overlay-card">
        <h3>兵卒升变 (Promotion)</h3>
        <p>请选择升级成的兵种：</p>
        <div class="promotion-options">
          <button class="promo-btn" data-piece="q">♛ 后 (Queen)</button>
          <button class="promo-btn" data-piece="r">♜ 车 (Rook)</button>
          <button class="promo-btn" data-piece="b">♝ 象 (Bishop)</button>
          <button class="promo-btn" data-piece="n">♞ 马 (Knight)</button>
        </div>
      </div>
    </div>

    <!-- 终局遮罩 (将死/和局) -->
    <div id="gameoverOverlay" class="overlay hidden">
      <div class="overlay-card">
        <h2 id="winText">将死 (Checkmate)</h2>
        <p id="winDesc">白方击败了黑方，天下一统！</p>
        <button id="restartBtn" class="btn">重整旗鼓</button>
      </div>
    </div>
  </main>

  <footer class="help-guide">
    <p>点击选择己方棋子，点击目标可行进格（带绿圈高光）完成走子。</p>
    <p>AI 将在玩家走子后自动推演，棋盘下方的状态栏可用于切换人机与双人模式。</p>
  </footer>

  <script src="game.js"></script>
</body>
</html>
