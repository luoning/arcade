<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bricks - 霓虹街机俄罗斯方块</title>
  <meta name="description" content="一个视觉惊艳、带8-bit电子合成音效的经典街机风俄罗斯方块网页游戏，支持键盘与手机触摸控制。">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect x=%2210%22 y=%2210%22 width=%2280%22 height=%2280%22 rx=%2215%22 fill=%22%239d4edd%22/><rect x=%2230%22 y=%2230%22 width=%2240%22 height=%2240%22 rx=%228%22 fill=%22%2300f5d4%22/></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header-actions">
    <!-- 静音按钮 -->
    <button id="muteBtn" class="action-icon-btn" title="开关音效" aria-label="Mute sound">
      <!-- 喇叭图标 -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
        <path id="soundWave" d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"></path>
      </svg>
    </button>
    
    <!-- 暂停按钮 -->
    <button id="pauseBtnHeader" class="action-icon-btn" title="暂停游戏 (P)" aria-label="Pause game">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="4" x2="18" y2="20"></line>
        <line x1="6" y1="4" x2="6" y2="20"></line>
      </svg>
    </button>
  </header>

  <h1 class="game-title">Bricks</h1>

  <main class="game-container">
    
    <!-- 左侧栏: Hold 暂存区 与 操作指南 -->
    <aside class="sidebar">
      <section class="glass-panel side-panel" aria-labelledby="hold-title">
        <h2 id="hold-title" class="panel-title">Hold</h2>
        <canvas id="holdCanvas" width="100" height="100" class="preview-canvas"></canvas>
      </section>
      
      <section class="glass-panel controls-info" aria-labelledby="tips-title">
        <h2 id="tips-title" class="panel-title">操作指南</h2>
        <p><span class="key-badge">A</span> / <span class="key-badge">&larr;</span> : 左移</p>
        <p><span class="key-badge">D</span> / <span class="key-badge">&rarr;</span> : 右移</p>
        <p><span class="key-badge">S</span> / <span class="key-badge">&darr;</span> : 软降</p>
        <p><span class="key-badge">W</span> / <span class="key-badge">&uarr;</span> : 顺时针旋转</p>
        <p><span class="key-badge">Space</span> : 瞬间坠落</p>
        <p><span class="key-badge">C</span> / <span class="key-badge">Shift</span> : 暂存方块</p>
        <p><span class="key-badge">P</span> : 暂停 / 继续</p>
      </section>
    </aside>

    <!-- 中间: 游戏核心视口 -->
    <article class="canvas-wrapper">
      <canvas id="gameCanvas" width="300" height="600"></canvas>
      
      <!-- 游戏开始遮罩 -->
      <div id="startOverlay" class="overlay">
        <h2 class="start-text">TETRIS BRICKS</h2>
        <p>霓虹经典，丝滑手感，带上耳机体验 8-bit 复古电子音效！</p>
        <button id="startBtn" class="btn">开始游戏</button>
      </div>

      <!-- 游戏暂停遮罩 -->
      <div id="pauseOverlay" class="overlay hidden">
        <h2 class="pause-text">PAUSED</h2>
        <p>深呼吸，调整下手指节奏。</p>
        <button id="resumeBtn" class="btn">继续游戏</button>
      </div>

      <!-- 游戏结束遮罩 -->
      <div id="gameOverOverlay" class="overlay hidden">
        <h2 class="game-over-text">GAME OVER</h2>
        <p>这局打得不赖！要不再来一把？</p>
        <button id="restartBtn" class="btn btn-pink">重新开始</button>
      </div>
    </article>

    <!-- 右侧栏: 下一个预览 与 数据统计 -->
    <aside class="sidebar">
      <section class="glass-panel side-panel" aria-labelledby="next-title">
        <h2 id="next-title" class="panel-title">Next</h2>
        <canvas id="nextCanvas" width="100" height="100" class="preview-canvas"></canvas>
      </section>
      
      <section class="glass-panel side-panel" aria-labelledby="stats-title">
        <h2 id="stats-title" class="panel-title">STATS</h2>
        
        <div class="stat-box">
          <p class="stat-label">Score</p>
          <p id="scoreVal" class="stat-value">000000</p>
        </div>
        
        <div class="stat-box">
          <p class="stat-label">Level</p>
          <p id="levelVal" class="stat-value">1</p>
        </div>
        
        <div class="stat-box">
          <p class="stat-label">Lines</p>
          <p id="linesVal" class="stat-value">0</p>
        </div>
      </section>
    </aside>

  </main>

  <!-- 移动端虚拟按键 (大屏幕默认隐藏) -->
  <nav class="mobile-controls" aria-label="Mobile Controls">
    <button id="mRotate" class="control-btn" aria-label="Rotate">Rotate</button>
    <button id="mHold" class="control-btn" aria-label="Hold Piece">Hold</button>
    <button id="mDrop" class="control-btn" aria-label="Hard Drop">Drop</button>
    
    <button id="mLeft" class="control-btn" aria-label="Move Left">&larr;</button>
    <button id="mDown" class="control-btn" aria-label="Soft Drop">&darr;</button>
    <button id="mRight" class="control-btn" aria-label="Move Right">&rarr;</button>
  </nav>

  <script src="game.js"></script>
</body>
</html>
